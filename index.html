<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Service Planner v2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
:root{
    --bg:#f4f7fb;
    --panel:#ffffff;
    --panel-soft:#f8fafc;
    --border:#d9e2ef;
    --border-strong:#b9c6d8;
    --text:#111827;
    --muted:#6b7280;
    --blue:#1f7ed0;
    --blue-dark:#1669ad;
    --red:#ef4444;
    --yellow:#facc15;
    --yellow-dark:#a16207;
    --purple:#7e3fbd;
    --purple-dark:#663399;
    --green:#16a34a;
    --shadow:0 14px 35px rgba(15,23,42,0.16);
    --shadow-soft:0 6px 18px rgba(15,23,42,0.08);
}

*{
    box-sizing:border-box;
}

html,
body{
    height:100%;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:var(--text);
    background:var(--bg);
}

button,
input{
    font:inherit;
}

button{
    cursor:pointer;
}

button:disabled{
    cursor:not-allowed;
    opacity:0.5;
}

#app{
    display:flex;
    height:100vh;
    min-height:560px;
    overflow:hidden;
}

#sidebar{
    width:395px;
    max-width:42vw;
    min-width:340px;
    background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
    border-right:1px solid var(--border);
    overflow:auto;
    padding:18px 16px 20px;
    box-shadow:8px 0 24px rgba(15,23,42,0.08);
    z-index:10;
}

.sidebar-title{
    display:flex;
    align-items:center;
    gap:11px;
    margin-bottom:16px;
}

.logo-pin{
    width:28px;
    height:28px;
    display:grid;
    place-items:center;
    color:#fff;
    border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    background:var(--red);
    box-shadow:0 6px 14px rgba(239,68,68,0.28);
    flex:0 0 auto;
}

.logo-pin span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#fff;
    transform:rotate(45deg);
}

h1{
    font-size:26px;
    line-height:1.1;
    margin:0;
    letter-spacing:-0.04em;
}

.search-box{
    position:relative;
    margin-bottom:12px;
}

#search{
    width:100%;
    height:48px;
    padding:0 42px 0 15px;
    border:1px solid var(--border-strong);
    border-radius:8px;
    outline:none;
    background:#fff;
    color:var(--text);
    box-shadow:0 1px 2px rgba(15,23,42,0.04);
}

#search:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(31,126,208,0.15);
}

#clearSearch{
    position:absolute;
    right:7px;
    top:7px;
    width:34px;
    height:34px;
    border:0;
    border-radius:7px;
    background:transparent;
    color:var(--muted);
    font-size:22px;
    line-height:1;
}

#clearSearch:hover{
    background:#eef4fb;
    color:var(--text);
}

.status-card,
.route-card,
.jobs-card{
    background:rgba(255,255,255,0.94);
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:var(--shadow-soft);
}

.status-card{
    padding:14px;
    margin-bottom:14px;
}

.status-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:12px;
}

.status-count{
    font-size:17px;
    font-weight:800;
}

.status-updated{
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
}

.stat-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.stat-pill{
    display:flex;
    align-items:center;
    gap:7px;
    min-height:31px;
    font-size:14px;
    color:#1f2937;
}

.stat-dot,
.legend-dot{
    width:13px;
    height:13px;
    border-radius:50%;
    display:inline-block;
    flex:0 0 auto;
}

.dot-red{background:var(--red);}
.dot-blue{background:var(--blue);}
.dot-yellow{background:var(--yellow);}
.dot-purple{background:var(--purple);}

.tabs{
    display:grid;
    grid-template-columns:1fr 1.1fr 1.1fr;
    gap:0;
    margin-bottom:14px;
    border:1px solid var(--border);
    border-radius:9px;
    overflow:hidden;
    background:#fff;
}

.tab-button{
    border:0;
    background:#fff;
    color:#1f2937;
    min-height:43px;
    padding:0 8px;
    border-right:1px solid var(--border);
    font-size:13px;
}

.tab-button:last-child{
    border-right:0;
}

.tab-button.active{
    background:#ecf5ff;
    color:var(--blue-dark);
    font-weight:800;
    box-shadow:inset 0 0 0 1px rgba(31,126,208,0.45);
}

.route-card{
    margin-bottom:15px;
    overflow:hidden;
}

.route-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:13px 14px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(90deg,#fff8e1 0%,#ffffff 48%,#f4edff 100%);
}

.route-heading{
    display:flex;
    flex-direction:column;
    gap:2px;
}

.section-title{
    font-size:15px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:0.04em;
}

.section-subtitle{
    font-size:12px;
    color:var(--muted);
}

.route-count-badge{
    min-width:28px;
    height:28px;
    padding:0 8px;
    border-radius:999px;
    background:var(--purple);
    color:#fff;
    display:grid;
    place-items:center;
    font-weight:900;
    font-size:13px;
}

#routeList{
    background:#fff;
}

.empty-route{
    padding:18px 14px;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.route-item{
    display:grid;
    grid-template-columns:36px 1fr auto;
    gap:10px;
    align-items:center;
    padding:12px 10px 12px 14px;
    border-bottom:1px solid var(--border);
}

.route-item:last-child{
    border-bottom:0;
}

.route-number{
    width:30px;
    height:30px;
    border-radius:50%;
    color:#fff;
    display:grid;
    place-items:center;
    font-weight:900;
    box-shadow:0 4px 10px rgba(15,23,42,0.18);
}

.route-number.start{
    background:var(--yellow);
    color:#111827;
}

.route-number.stop{
    background:var(--purple);
}

.route-type{
    display:block;
    font-size:11px;
    color:var(--yellow-dark);
    font-weight:900;
    text-transform:uppercase;
    margin-bottom:3px;
    letter-spacing:0.03em;
}

.route-type.stop{
    color:var(--purple-dark);
}

.route-info strong{
    display:block;
    font-size:15px;
    margin-bottom:2px;
}

.route-info span.address{
    display:block;
    font-size:13px;
    color:#273244;
    line-height:1.32;
}

.route-info span.county{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-top:3px;
}

.route-tools{
    display:flex;
    flex-direction:column;
    gap:4px;
    align-items:flex-end;
}

.mini-tools{
    display:flex;
    gap:4px;
}

.icon-btn{
    width:29px;
    height:29px;
    border:1px solid var(--border);
    border-radius:7px;
    background:#fff;
    color:#374151;
    font-weight:800;
    line-height:1;
}

.icon-btn:hover:not(:disabled){
    background:#f1f5f9;
}

.icon-btn.danger:hover:not(:disabled){
    background:#fff1f2;
    border-color:#fecdd3;
    color:#be123c;
}

.route-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    padding:12px 14px 14px;
    background:#fbfdff;
    border-top:1px solid var(--border);
}

.route-actions .full-width{
    grid-column:1 / -1;
}

.btn{
    min-height:44px;
    border-radius:8px;
    border:1px solid var(--border-strong);
    background:#fff;
    color:#1f2937;
    font-weight:800;
    box-shadow:0 1px 2px rgba(15,23,42,0.05);
}

.btn:hover:not(:disabled){
    background:#f8fafc;
}

.btn-primary{
    border-color:var(--blue);
    background:linear-gradient(180deg,#2e91eb 0%,#1f75d1 100%);
    color:#fff;
    box-shadow:0 8px 16px rgba(31,126,208,0.24);
}

.btn-primary:hover:not(:disabled){
    background:linear-gradient(180deg,#2486dd 0%,#1768bd 100%);
}

.btn-danger{
    border-color:#fecdd3;
    color:#be123c;
}

.jobs-card{
    overflow:hidden;
}

.jobs-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:13px 14px;
    border-bottom:1px solid var(--border);
    background:#fff;
}

.jobs-header small{
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
}

#list{
    background:#fff;
}

.job-card{
    position:relative;
    padding:13px 12px 13px 15px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:background 0.16s ease, transform 0.16s ease;
}

.job-card:hover{
    background:#f3f8ff;
}

.job-card.selected{
    background:#faf5ff;
    border-left:4px solid var(--purple);
    padding-left:11px;
}

.job-card.high:not(.selected){
    border-left:4px solid var(--red);
    padding-left:11px;
}

.job-main{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:start;
}

.job-eircode{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:16px;
    font-weight:900;
    margin-bottom:4px;
}

.priority-pin{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 0 3px rgba(31,126,208,0.12);
}

.priority-pin.high{
    background:var(--red);
    box-shadow:0 0 0 3px rgba(239,68,68,0.12);
}

.priority-pin.start{
    background:var(--yellow);
    box-shadow:0 0 0 3px rgba(250,204,21,0.2);
}

.priority-pin.selected{
    background:var(--purple);
    box-shadow:0 0 0 3px rgba(126,63,189,0.14);
}

.job-address{
    color:#1f2937;
    line-height:1.35;
    margin-bottom:4px;
}

.job-county{
    color:var(--muted);
    font-size:13px;
}

.job-badges{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
}

.badge{
    border-radius:999px;
    padding:4px 8px;
    font-size:11px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:0.02em;
    white-space:nowrap;
}

.badge-high{
    color:#991b1b;
    background:#fee2e2;
}

.badge-normal{
    color:#1d4ed8;
    background:#dbeafe;
}

.badge-route{
    color:#5b21b6;
    background:#ede9fe;
}

.job-actions{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
    margin-top:10px;
}

.small-btn,
.job-link{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:31px;
    padding:0 9px;
    border-radius:7px;
    border:1px solid var(--border);
    background:#fff;
    color:#1f2937;
    text-decoration:none;
    font-size:12px;
    font-weight:800;
}

.small-btn:hover:not(:disabled),
.job-link:hover{
    background:#eef6ff;
    border-color:#b9d9ff;
}

.small-btn.selected-action{
    color:#5b21b6;
    border-color:#d8b4fe;
    background:#faf5ff;
}

.empty-list{
    padding:22px 14px;
    color:var(--muted);
    font-size:14px;
    line-height:1.4;
}

#mapWrap{
    flex:1;
    min-width:0;
    position:relative;
    background:#dbeafe;
}

#map{
    width:100%;
    height:100%;
}

.map-overlay{
    position:absolute;
    z-index:500;
    background:rgba(255,255,255,0.95);
    border:1px solid rgba(185,198,216,0.8);
    box-shadow:var(--shadow);
    backdrop-filter:blur(8px);
}

#routeTopbar{
    left:86px;
    top:14px;
    right:290px;
    min-height:120px;
    border-radius:12px;
    padding:15px 18px 14px;
}

.topbar-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-bottom:10px;
}

.topbar-title{
    font-size:14px;
    color:#374151;
    font-weight:800;
}

.clear-all-map{
    min-height:36px;
    padding:0 12px;
    border-radius:7px;
    border:1px solid var(--border);
    background:#fff;
    font-weight:800;
    color:#1f2937;
}

.topbar-steps{
    display:flex;
    align-items:flex-start;
    gap:10px;
    overflow:auto;
    padding-bottom:2px;
}

.top-step{
    min-width:76px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:5px;
    color:#111827;
}

.step-pin{
    width:32px;
    height:32px;
    border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    display:grid;
    place-items:center;
    background:#e5e7eb;
    color:#6b7280;
    border:2px solid #fff;
    box-shadow:0 6px 12px rgba(15,23,42,0.14);
}

.step-pin span{
    transform:rotate(45deg);
    font-size:13px;
    font-weight:900;
}

.step-pin.start{
    background:var(--yellow);
    color:#111827;
}

.step-pin.selected{
    background:var(--purple);
    color:#fff;
}

.step-pin.empty{
    border:2px dashed #94a3b8;
    background:#fff;
    color:#64748b;
}

.step-label{
    font-size:12px;
    font-weight:800;
    line-height:1.12;
}

.step-sub{
    font-size:11px;
    color:var(--muted);
    max-width:78px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.step-arrow{
    padding-top:8px;
    color:#111827;
    font-size:21px;
    font-weight:900;
}

#legend{
    right:16px;
    top:62px;
    width:190px;
    border-radius:10px;
    padding:13px 14px;
}

.legend-row{
    display:flex;
    align-items:center;
    gap:9px;
    min-height:30px;
    font-size:14px;
    font-weight:700;
}

.legend-line{
    width:25px;
    border-top:3px dashed var(--purple);
}

#fitSelection{
    right:16px;
    bottom:18px;
    border:0;
    border-radius:10px;
    padding:0 16px;
    min-height:50px;
    font-weight:900;
    color:#111827;
}

.service-marker-wrapper{
    background:transparent;
    border:0;
}

.service-marker{
    width:30px;
    height:30px;
    border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    display:grid;
    place-items:center;
    border:2px solid #fff;
    box-shadow:0 9px 18px rgba(15,23,42,0.35);
    color:#fff;
}

.service-marker span{
    transform:rotate(45deg);
    font-size:13px;
    font-weight:900;
    line-height:1;
}

.service-marker.normal{background:var(--blue);}
.service-marker.high{background:var(--red);}
.service-marker.start{background:var(--yellow); color:#111827;}
.service-marker.selected{background:var(--purple);}

.popup-card{
    min-width:210px;
}

.popup-card strong{
    font-size:16px;
}

.popup-meta{
    color:#4b5563;
    margin:4px 0 8px;
    line-height:1.35;
}

.popup-priority{
    margin:7px 0;
    font-weight:800;
}

.popup-route-status{
    margin:7px 0;
    color:#5b21b6;
    font-weight:800;
}

.popup-links{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
}

.popup-links a{
    display:inline-flex;
    align-items:center;
    min-height:29px;
    padding:0 8px;
    border-radius:6px;
    background:#f1f5f9;
    color:#0f172a;
    text-decoration:none;
    font-weight:800;
}

.popup-links a:hover{
    background:#e0f2fe;
}

.leaflet-popup-content-wrapper{
    border-radius:10px;
}

@media(max-width:1100px){
    #routeTopbar{
        right:16px;
        left:76px;
    }

    #legend{
        display:none;
    }
}

@media(max-width:820px){
    #app{
        flex-direction:column;
    }

    #sidebar{
        width:100%;
        max-width:none;
        min-width:0;
        height:43vh;
        border-right:0;
        border-bottom:1px solid var(--border);
    }

    #mapWrap{
        height:57vh;
    }

    #routeTopbar{
        display:none;
    }

    #fitSelection{
        min-height:44px;
        bottom:12px;
        right:12px;
    }

    .stat-grid{
        grid-template-columns:1fr 1fr;
    }
}

@media(max-width:470px){
    .tabs{
        grid-template-columns:1fr;
    }

    .tab-button{
        border-right:0;
        border-bottom:1px solid var(--border);
    }

    .tab-button:last-child{
        border-bottom:0;
    }

    .route-actions{
        grid-template-columns:1fr;
    }

    .route-actions .full-width{
        grid-column:auto;
    }
}
</style>
</head>

<body>
<div id="app">
    <aside id="sidebar">
        <div class="sidebar-title">
            <div class="logo-pin"><span></span></div>
            <h1>Service Locations</h1>
        </div>

        <div class="search-box">
            <input id="search" type="search" placeholder="Search Eircode, Address or County" autocomplete="off">
            <button id="clearSearch" type="button" title="Clear search">&times;</button>
        </div>

        <section class="status-card" aria-live="polite">
            <div class="status-row">
                <div id="status" class="status-count">Loading locations...</div>
                <div id="lastUpdated" class="status-updated">Please wait</div>
            </div>
            <div class="stat-grid">
                <div class="stat-pill"><span class="stat-dot dot-red"></span><span id="highCount">High Priority: 0</span></div>
                <div class="stat-pill"><span class="stat-dot dot-blue"></span><span id="normalCount">Normal: 0</span></div>
                <div class="stat-pill"><span class="stat-dot dot-yellow"></span><span id="startCount">Starting Point: 0</span></div>
                <div class="stat-pill"><span class="stat-dot dot-purple"></span><span id="selectedCount">Selected Stops: 0</span></div>
            </div>
        </section>

        <div class="tabs" role="tablist" aria-label="Job filters">
            <button class="tab-button active" type="button" data-tab="all">All Locations</button>
            <button class="tab-button" type="button" data-tab="high">High Priority</button>
            <button class="tab-button" type="button" data-tab="selected">My Selection</button>
        </div>

        <section class="route-card">
            <div class="route-header">
                <div class="route-heading">
                    <div class="section-title">Today's Route</div>
                    <div class="section-subtitle">Click pins or job buttons to select up to 5 stops.</div>
                </div>
                <div id="routeCountBadge" class="route-count-badge">0</div>
            </div>

            <div id="routeList"></div>

            <div class="route-actions">
                <button id="clearRoute" type="button" class="btn btn-danger">Clear Route</button>
                <button id="fitRoute" type="button" class="btn">Fit Route</button>
                <button id="openRoute" type="button" class="btn btn-primary full-width">Open Route in Google Maps</button>
            </div>
        </section>

        <section class="jobs-card">
            <div class="jobs-header">
                <div class="section-title">Jobs</div>
                <small id="jobsShown">0 shown</small>
            </div>
            <div id="list"></div>
        </section>
    </aside>

    <main id="mapWrap">
        <div id="map"></div>

        <div id="routeTopbar" class="map-overlay">
            <div class="topbar-head">
                <div class="topbar-title">Select up to 5 locations</div>
                <button id="clearAllMap" type="button" class="clear-all-map">Clear All</button>
            </div>
            <div id="topRouteSteps" class="topbar-steps"></div>
        </div>

        <div id="legend" class="map-overlay">
            <div class="legend-row"><span class="legend-dot dot-red"></span>High Priority</div>
            <div class="legend-row"><span class="legend-dot dot-blue"></span>Normal</div>
            <div class="legend-row"><span class="legend-dot dot-yellow"></span>Starting Point</div>
            <div class="legend-row"><span class="legend-dot dot-purple"></span>Selected Stop</div>
            <div class="legend-row"><span class="legend-line"></span>Selected Route</div>
        </div>

        <button id="fitSelection" type="button" class="map-overlay">Fit to Selection</button>
    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/*
    Service Planner v2
    Single file app: Google Sheets CSV -> Leaflet map -> dispatch route planner.
*/

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXK2ORRbNjfLgHiGVcgzGb25eACW7SSkG-m0d50-7wSmEFa-90VMIqYuzpYpbxN8AWD_-NuC3QtCRu/pub?gid=0&single=true&output=csv";
const MAX_ROUTE_STOPS = 5;
const ROUTE_STORAGE_KEY = "servicePlannerV2SelectedRoute";

let rows = [];
let markers = [];
let selectedJobs = [];
let routeLine = null;
let currentSearch = "";
let currentTab = "all";

const map = L.map("map", {
    zoomControl:true,
    preferCanvas:false
}).setView([53.35, -7.7], 7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution:"&copy; OpenStreetMap contributors"
}).addTo(map);

const els = {
    search:document.getElementById("search"),
    clearSearch:document.getElementById("clearSearch"),
    status:document.getElementById("status"),
    lastUpdated:document.getElementById("lastUpdated"),
    highCount:document.getElementById("highCount"),
    normalCount:document.getElementById("normalCount"),
    startCount:document.getElementById("startCount"),
    selectedCount:document.getElementById("selectedCount"),
    routeCountBadge:document.getElementById("routeCountBadge"),
    routeList:document.getElementById("routeList"),
    list:document.getElementById("list"),
    jobsShown:document.getElementById("jobsShown"),
    clearRoute:document.getElementById("clearRoute"),
    fitRoute:document.getElementById("fitRoute"),
    openRoute:document.getElementById("openRoute"),
    clearAllMap:document.getElementById("clearAllMap"),
    topRouteSteps:document.getElementById("topRouteSteps"),
    fitSelection:document.getElementById("fitSelection"),
    tabButtons:Array.from(document.querySelectorAll(".tab-button"))
};

function escapeHtml(value){
    return String(value ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
}

function clean(value){
    return String(value ?? "").trim();
}

function parseCSV(text){
    const parsed = [];
    let row = [];
    let field = "";
    let inQuotes = false;

    for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"'){
            if(inQuotes && next === '"'){
                field += '"';
                i++;
            }else{
                inQuotes = !inQuotes;
            }
        }else if(char === "," && !inQuotes){
            row.push(field);
            field = "";
        }else if((char === "\n" || char === "\r") && !inQuotes){
            if(char === "\r" && next === "\n"){
                i++;
            }
            row.push(field);
            if(row.some(cell => clean(cell) !== "")){
                parsed.push(row);
            }
            row = [];
            field = "";
        }else{
            field += char;
        }
    }

    row.push(field);
    if(row.some(cell => clean(cell) !== "")){
        parsed.push(row);
    }

    return parsed;
}

function normalizePriority(value){
    const priority = clean(value).toLowerCase();
    return priority === "high" ? "High" : "Standard";
}

function isHighPriority(job){
    return job.priority === "High";
}

function makeJobId(job, index){
    if(job.eircode){
        return "eircode:" + job.eircode.toUpperCase().replace(/\s+/g, "");
    }
    return ["job", index, job.lat.toFixed(6), job.lng.toFixed(6), job.address.toLowerCase()].join("|");
}

function getSelectedIndex(job){
    return selectedJobs.findIndex(selected => selected.id === job.id);
}

function isSelected(job){
    return getSelectedIndex(job) !== -1;
}

function coordinates(job){
    return job.lat + "," + job.lng;
}

function isValidUrl(value){
    try{
        const url = new URL(value);
        return url.protocol === "http:" || url.protocol === "https:";
    }catch(error){
        return false;
    }
}

function createMarkerIcon(job){
    const index = getSelectedIndex(job);
    let type = isHighPriority(job) ? "high" : "normal";
    let label = "";

    if(index === 0){
        type = "start";
        label = "1";
    }else if(index > 0){
        type = "selected";
        label = String(index + 1);
    }

    return L.divIcon({
        className:"service-marker-wrapper",
        html:'<div class="service-marker ' + type + '"><span>' + label + '</span></div>',
        iconSize:[36,44],
        iconAnchor:[18,42],
        popupAnchor:[0,-38]
    });
}

function buildPopup(job){
    const index = getSelectedIndex(job);
    const priorityLabel = isHighPriority(job)
        ? '<span style="color:#ef4444">High Priority</span>'
        : '<span style="color:#1f7ed0">Normal Priority</span>';
    const routeStatus = index === -1
        ? "Click this pin to add it to today's route."
        : (index === 0 ? "Selected as Starting Point" : "Selected as Stop " + (index + 1));
    const ticketLink = isValidUrl(job.ticketUrl)
        ? '<a href="' + escapeHtml(job.ticketUrl) + '" target="_blank" rel="noopener">Open Zoho</a>'
        : "";
    const navigateLink = '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(coordinates(job)) + '&travelmode=driving" target="_blank" rel="noopener">Navigate</a>';

    return '' +
        '<div class="popup-card">' +
            '<strong>' + escapeHtml(job.eircode || "No Eircode") + '</strong>' +
            '<div class="popup-meta">' + escapeHtml(job.address) + '<br>' + escapeHtml(job.county) + '</div>' +
            '<div class="popup-priority">' + priorityLabel + '</div>' +
            '<div class="popup-route-status">' + escapeHtml(routeStatus) + '</div>' +
            '<div class="popup-links">' + ticketLink + navigateLink + '</div>' +
        '</div>';
}

function refreshMarkersAndPopups(){
    rows.forEach(job => {
        if(job.marker){
            job.marker.setIcon(createMarkerIcon(job));
            job.marker.setPopupContent(buildPopup(job));
        }
    });
}

function redrawRouteLine(){
    if(routeLine){
        map.removeLayer(routeLine);
        routeLine = null;
    }

    if(selectedJobs.length < 2){
        return;
    }

    routeLine = L.polyline(selectedJobs.map(job => [job.lat, job.lng]), {
        color:"#7e3fbd",
        weight:5,
        opacity:0.82,
        dashArray:"11 7",
        lineCap:"round"
    }).addTo(map);
}

function saveSelectedRoute(){
    try{
        localStorage.setItem(ROUTE_STORAGE_KEY, JSON.stringify(selectedJobs.map(job => job.id)));
    }catch(error){
        console.warn("Could not save selected route", error);
    }
}

function restoreSelectedRoute(){
    try{
        const stored = JSON.parse(localStorage.getItem(ROUTE_STORAGE_KEY) || "[]");
        if(!Array.isArray(stored)){
            selectedJobs = [];
            return;
        }
        selectedJobs = stored
            .map(id => rows.find(job => job.id === id))
            .filter(Boolean)
            .slice(0, MAX_ROUTE_STOPS);
    }catch(error){
        selectedJobs = [];
    }
}

function updateAfterSelectionChange(options = {}){
    saveSelectedRoute();
    refreshMarkersAndPopups();
    redrawRouteLine();
    renderAll();

    if(options.fit){
        fitSelectedRoute();
    }
}

function toggleSelection(job){
    const index = getSelectedIndex(job);

    if(index >= 0){
        selectedJobs.splice(index, 1);
    }else{
        if(selectedJobs.length >= MAX_ROUTE_STOPS){
            alert("You can select up to " + MAX_ROUTE_STOPS + " locations.");
            return;
        }
        selectedJobs.push(job);
    }

    updateAfterSelectionChange();
}

function removeStop(jobId){
    const index = selectedJobs.findIndex(job => job.id === jobId);
    if(index === -1){
        return;
    }
    selectedJobs.splice(index, 1);
    updateAfterSelectionChange();
}

function moveStop(jobId, direction){
    const index = selectedJobs.findIndex(job => job.id === jobId);
    const nextIndex = index + direction;
    if(index === -1 || nextIndex < 0 || nextIndex >= selectedJobs.length){
        return;
    }
    const temp = selectedJobs[index];
    selectedJobs[index] = selectedJobs[nextIndex];
    selectedJobs[nextIndex] = temp;
    updateAfterSelectionChange();
}

function clearRoute(){
    selectedJobs = [];
    updateAfterSelectionChange();
}

function fitBoundsForJobs(jobs){
    const validJobs = jobs.filter(job => Number.isFinite(job.lat) && Number.isFinite(job.lng));
    if(validJobs.length === 0){
        map.setView([53.35, -7.7], 7);
        return;
    }

    if(validJobs.length === 1){
        map.setView([validJobs[0].lat, validJobs[0].lng], 13);
        return;
    }

    const bounds = L.latLngBounds(validJobs.map(job => [job.lat, job.lng]));
    map.fitBounds(bounds, {
        padding:[60, 60],
        maxZoom:13
    });
}

function fitSelectedRoute(){
    if(selectedJobs.length > 0){
        fitBoundsForJobs(selectedJobs);
    }else{
        fitBoundsForJobs(rows);
    }
}

function focusJob(job){
    map.setView([job.lat, job.lng], 14);
    if(job.marker){
        job.marker.openPopup();
    }
}

function googleMapsRouteUrl(){
    if(selectedJobs.length === 0){
        return "";
    }

    if(selectedJobs.length === 1){
        return "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(coordinates(selectedJobs[0])) + "&travelmode=driving";
    }

    const origin = coordinates(selectedJobs[0]);
    const destination = coordinates(selectedJobs[selectedJobs.length - 1]);
    const waypoints = selectedJobs.slice(1, -1).map(coordinates);
    const params = new URLSearchParams();

    params.set("api", "1");
    params.set("origin", origin);
    params.set("destination", destination);
    if(waypoints.length > 0){
        params.set("waypoints", waypoints.join("|"));
    }
    params.set("travelmode", "driving");

    return "https://www.google.com/maps/dir/?" + params.toString();
}

function openRouteInGoogleMaps(){
    if(selectedJobs.length === 0){
        alert("Select at least one location first.");
        return;
    }

    window.open(googleMapsRouteUrl(), "_blank", "noopener");
}

function searchMatches(job){
    const filter = currentSearch.trim().toLowerCase();
    if(!filter){
        return true;
    }
    return [job.eircode, job.address, job.county, job.priority]
        .join(" ")
        .toLowerCase()
        .includes(filter);
}

function jobsForCurrentView(){
    if(currentTab === "selected"){
        return selectedJobs.filter(searchMatches);
    }

    return rows.filter(job => {
        if(!searchMatches(job)){
            return false;
        }
        if(currentTab === "high"){
            return isHighPriority(job);
        }
        return true;
    });
}

function renderStats(){
    const total = rows.length;
    const high = rows.filter(isHighPriority).length;
    const normal = total - high;
    const startCount = selectedJobs.length > 0 ? 1 : 0;
    const selectedStops = Math.max(selectedJobs.length - 1, 0);

    els.status.textContent = total + " locations loaded";
    els.highCount.textContent = "High Priority: " + high;
    els.normalCount.textContent = "Normal: " + normal;
    els.startCount.textContent = "Starting Point: " + startCount;
    els.selectedCount.textContent = "Selected Stops: " + selectedStops;
    els.routeCountBadge.textContent = selectedJobs.length;

    els.tabButtons.forEach(button => {
        const tab = button.dataset.tab;
        if(tab === "all"){
            button.textContent = "All Locations (" + total + ")";
        }else if(tab === "high"){
            button.textContent = "High Priority (" + high + ")";
        }else if(tab === "selected"){
            button.textContent = "My Selection (" + selectedJobs.length + ")";
        }
        button.classList.toggle("active", tab === currentTab);
    });

    els.clearRoute.disabled = selectedJobs.length === 0;
    els.clearAllMap.disabled = selectedJobs.length === 0;
    els.fitRoute.disabled = rows.length === 0;
    els.fitSelection.disabled = rows.length === 0;
    els.openRoute.disabled = selectedJobs.length === 0;
}

function renderRoutePanel(){
    if(selectedJobs.length === 0){
        els.routeList.innerHTML = '<div class="empty-route">No route selected yet. Click a map pin, or use the Add to Route button in the job list. The first selected job becomes the starting point.</div>';
        return;
    }

    els.routeList.innerHTML = selectedJobs.map((job, index) => {
        const isStart = index === 0;
        const routeType = isStart ? "Starting Point" : "Stop " + (index + 1);
        const routeClass = isStart ? "start" : "stop";
        return '' +
            '<article class="route-item">' +
                '<div class="route-number ' + routeClass + '">' + (index + 1) + '</div>' +
                '<div class="route-info">' +
                    '<span class="route-type ' + routeClass + '">' + escapeHtml(routeType) + '</span>' +
                    '<strong>' + escapeHtml(job.eircode || "No Eircode") + '</strong>' +
                    '<span class="address">' + escapeHtml(job.address) + '</span>' +
                    '<span class="county">' + escapeHtml(job.county) + '</span>' +
                '</div>' +
                '<div class="route-tools">' +
                    '<div class="mini-tools">' +
                        '<button type="button" class="icon-btn" data-action="up" data-id="' + escapeHtml(job.id) + '" title="Move up" ' + (index === 0 ? "disabled" : "") + '>Up</button>' +
                        '<button type="button" class="icon-btn" data-action="down" data-id="' + escapeHtml(job.id) + '" title="Move down" ' + (index === selectedJobs.length - 1 ? "disabled" : "") + '>Dn</button>' +
                    '</div>' +
                    '<div class="mini-tools">' +
                        '<button type="button" class="icon-btn" data-action="focus" data-id="' + escapeHtml(job.id) + '" title="Show on map">Map</button>' +
                        '<button type="button" class="icon-btn danger" data-action="remove" data-id="' + escapeHtml(job.id) + '" title="Remove">X</button>' +
                    '</div>' +
                '</div>' +
            '</article>';
    }).join("");

    els.routeList.querySelectorAll("button[data-action]").forEach(button => {
        button.addEventListener("click", event => {
            event.stopPropagation();
            const action = button.dataset.action;
            const id = button.dataset.id;
            const job = rows.find(item => item.id === id);

            if(action === "up"){
                moveStop(id, -1);
            }else if(action === "down"){
                moveStop(id, 1);
            }else if(action === "remove"){
                removeStop(id);
            }else if(action === "focus" && job){
                focusJob(job);
            }
        });
    });
}

function renderTopRouteBar(){
    const parts = [];

    for(let i = 0; i < MAX_ROUTE_STOPS; i++){
        const job = selectedJobs[i];
        const isStart = i === 0;
        const pinClass = job ? (isStart ? "start" : "selected") : "empty";
        const pinText = job ? String(i + 1) : "+";
        const label = job
            ? (isStart ? "Starting Point" : "Stop " + (i + 1))
            : (isStart ? "Starting Point" : "Add Stop");
        const sub = job ? (job.eircode || job.county || "Selected") : "";
        const clickable = job ? ' data-id="' + escapeHtml(job.id) + '"' : "";

        parts.push(
            '<div class="top-step"' + clickable + '>' +
                '<div class="step-pin ' + pinClass + '"><span>' + escapeHtml(pinText) + '</span></div>' +
                '<div class="step-label">' + escapeHtml(label) + '</div>' +
                '<div class="step-sub">' + escapeHtml(sub) + '</div>' +
            '</div>'
        );

        if(i < MAX_ROUTE_STOPS - 1){
            parts.push('<div class="step-arrow">&rarr;</div>');
        }
    }

    els.topRouteSteps.innerHTML = parts.join("");
    els.topRouteSteps.querySelectorAll(".top-step[data-id]").forEach(step => {
        step.addEventListener("click", () => {
            const job = rows.find(item => item.id === step.dataset.id);
            if(job){
                focusJob(job);
            }
        });
    });
}

function jobCardHtml(job){
    const index = getSelectedIndex(job);
    const selected = index !== -1;
    const isStart = index === 0;
    const high = isHighPriority(job);
    const pinClass = selected ? (isStart ? "start" : "selected") : (high ? "high" : "");
    const priorityBadge = high
        ? '<span class="badge badge-high">High</span>'
        : '<span class="badge badge-normal">Normal</span>';
    const routeBadge = selected
        ? '<span class="badge badge-route">' + (isStart ? "Start" : "Stop " + (index + 1)) + '</span>'
        : "";
    const ticketLink = isValidUrl(job.ticketUrl)
        ? '<a class="job-link" href="' + escapeHtml(job.ticketUrl) + '" target="_blank" rel="noopener">Open Zoho</a>'
        : "";
    const navigateLink = '<a class="job-link" href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(coordinates(job)) + '&travelmode=driving" target="_blank" rel="noopener">Navigate</a>';
    const addDisabled = !selected && selectedJobs.length >= MAX_ROUTE_STOPS ? "disabled" : "";
    const actionLabel = selected ? "Remove from Route" : "Add to Route";
    const actionClass = selected ? " selected-action" : "";

    return '' +
        '<div class="job-main">' +
            '<div>' +
                '<div class="job-eircode"><span class="priority-pin ' + pinClass + '"></span>' + escapeHtml(job.eircode || "No Eircode") + '</div>' +
                '<div class="job-address">' + escapeHtml(job.address) + '</div>' +
                '<div class="job-county">' + escapeHtml(job.county) + '</div>' +
            '</div>' +
            '<div class="job-badges">' + priorityBadge + routeBadge + '</div>' +
        '</div>' +
        '<div class="job-actions">' +
            '<button type="button" class="small-btn' + actionClass + '" data-action="toggle" ' + addDisabled + '>' + actionLabel + '</button>' +
            '<button type="button" class="small-btn" data-action="focus">Show on Map</button>' +
            ticketLink +
            navigateLink +
        '</div>';
}

function renderJobsList(){
    const jobs = jobsForCurrentView();
    els.jobsShown.textContent = jobs.length + " shown";

    if(rows.length === 0){
        els.list.innerHTML = '<div class="empty-list">No locations loaded yet.</div>';
        return;
    }

    if(jobs.length === 0){
        els.list.innerHTML = '<div class="empty-list">No jobs match the current search or filter.</div>';
        return;
    }

    els.list.innerHTML = "";

    jobs.forEach(job => {
        const card = document.createElement("article");
        const selected = isSelected(job);
        card.className = "job-card" + (selected ? " selected" : "") + (isHighPriority(job) ? " high" : "");
        card.innerHTML = jobCardHtml(job);
        card.addEventListener("click", () => focusJob(job));

        card.querySelectorAll("button, a").forEach(control => {
            control.addEventListener("click", event => event.stopPropagation());
        });

        const toggleButton = card.querySelector('button[data-action="toggle"]');
        if(toggleButton){
            toggleButton.addEventListener("click", () => toggleSelection(job));
        }

        const focusButton = card.querySelector('button[data-action="focus"]');
        if(focusButton){
            focusButton.addEventListener("click", () => focusJob(job));
        }

        els.list.appendChild(card);
    });
}

function renderAll(){
    renderStats();
    renderRoutePanel();
    renderTopRouteBar();
    renderJobsList();
}

function createMarkers(){
    markers.forEach(marker => map.removeLayer(marker));
    markers = [];

    rows.forEach(job => {
        const marker = L.marker([job.lat, job.lng], {
            icon:createMarkerIcon(job),
            keyboard:true,
            title:job.eircode || job.address
        }).addTo(map);

        marker.bindPopup(buildPopup(job));
        marker.on("click", () => toggleSelection(job));
        job.marker = marker;
        markers.push(marker);
    });
}

function setLoadedTime(){
    const now = new Date();
    const date = now.toLocaleDateString("en-IE", {
        day:"2-digit",
        month:"short",
        year:"numeric"
    });
    const time = now.toLocaleTimeString("en-IE", {
        hour:"2-digit",
        minute:"2-digit"
    });
    els.lastUpdated.textContent = "Loaded: " + date + " " + time;
}

function loadJobs(){
    fetch(CSV_URL, { cache:"no-store" })
        .then(response => {
            if(!response.ok){
                throw new Error("Google Sheet returned " + response.status);
            }
            return response.text();
        })
        .then(text => {
            const csvRows = parseCSV(text);
            const dataRows = csvRows.slice(1);

            rows = dataRows.map((columns, index) => {
                const job = {
                    address:clean(columns[0]),
                    county:clean(columns[1]),
                    eircode:clean(columns[2]),
                    lat:parseFloat(clean(columns[3])),
                    lng:parseFloat(clean(columns[4])),
                    ticketUrl:clean(columns[6]),
                    priority:normalizePriority(columns[7])
                };
                job.id = makeJobId(job, index);
                return job;
            }).filter(job => Number.isFinite(job.lat) && Number.isFinite(job.lng));

            restoreSelectedRoute();
            createMarkers();
            refreshMarkersAndPopups();
            redrawRouteLine();
            setLoadedTime();
            renderAll();
            fitSelectedRoute();
        })
        .catch(error => {
            console.error(error);
            els.status.textContent = "Could not load Google Sheet";
            els.lastUpdated.textContent = "Check published CSV";
            renderAll();
        });
}

els.search.addEventListener("input", event => {
    currentSearch = event.target.value;
    renderAll();
});

els.clearSearch.addEventListener("click", () => {
    els.search.value = "";
    currentSearch = "";
    renderAll();
    els.search.focus();
});

els.tabButtons.forEach(button => {
    button.addEventListener("click", () => {
        currentTab = button.dataset.tab;
        renderAll();
    });
});

els.clearRoute.addEventListener("click", clearRoute);
els.clearAllMap.addEventListener("click", clearRoute);
els.fitRoute.addEventListener("click", fitSelectedRoute);
els.fitSelection.addEventListener("click", fitSelectedRoute);
els.openRoute.addEventListener("click", openRouteInGoogleMaps);

loadJobs();
</script>
</body>
</html>
