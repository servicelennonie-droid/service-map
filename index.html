<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Service Planner v2.4</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">

<style>
:root{
    --bg:#f4f7fb;
    --panel:#ffffff;
    --panel-soft:#f8fafc;
    --border:#d9e2ef;
    --border-strong:#b9c6d8;
    --text:#111827;
    --muted:#64748b;
    --blue:#1f7ed0;
    --blue-dark:#1669ad;
    --red:#ef4444;
    --yellow:#facc15;
    --yellow-dark:#a16207;
    --purple:#7e3fbd;
    --purple-dark:#663399;
    --green:#16a34a;
    --shadow:0 14px 35px rgba(15,23,42,0.16);
    --shadow-soft:0 6px 18px rgba(15,23,42,0.08);
    --font-sans:ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

*{
    box-sizing:border-box;
}

html,
body{
    height:100%;
}

body{
    margin:0;
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color:var(--text);
    background:var(--bg);
}

button,
input{
    font:inherit;
}

button{
    cursor:pointer;
}

button:disabled{
    cursor:not-allowed;
    opacity:0.5;
}

#app{
    display:flex;
    height:100vh;
    min-height:560px;
    overflow:hidden;
}

#sidebar{
    width:382px;
    max-width:40vw;
    min-width:330px;
    background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
    border-right:1px solid var(--border);
    overflow:auto;
    padding:14px 10px 18px;
    box-shadow:8px 0 24px rgba(15,23,42,0.08);
    z-index:10;
}

.sidebar-title{
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:space-between;
    margin-bottom:6px;
}

.logo-pin{
    width:28px;
    height:28px;
    display:grid;
    place-items:center;
    color:#fff;
    border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    background:var(--red);
    box-shadow:0 6px 14px rgba(239,68,68,0.28);
    flex:0 0 auto;
}

.logo-pin span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#fff;
    transform:rotate(45deg);
}

h1{
    font-size:23px;
    font-weight:700;
    line-height:1.1;
    margin:0;
    letter-spacing:-0.025em;
    white-space:nowrap;
}

.search-box{
    position:relative;
    margin-bottom:8px;
}

#search{
    width:100%;
    height:44px;
    padding:0 42px 0 15px;
    border:1px solid var(--border-strong);
    border-radius:8px;
    outline:none;
    background:#fff;
    color:var(--text);
    box-shadow:0 1px 2px rgba(15,23,42,0.04);
}

#search:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(31,126,208,0.15);
}

#clearSearch{
    position:absolute;
    right:7px;
    top:7px;
    width:34px;
    height:34px;
    border:0;
    border-radius:7px;
    background:transparent;
    color:var(--muted);
    font-size:22px;
    line-height:1;
}

#clearSearch:hover{
    background:#eef4fb;
    color:var(--text);
}

.status-card,
.route-card,
.jobs-card{
    background:rgba(255,255,255,0.94);
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:var(--shadow-soft);
}

.status-card{
    padding:11px 12px;
    margin-bottom:7px;
}

.status-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
}

.status-count{
    font-size:18px;
    font-weight:700;
}

.status-updated{
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
}

.stat-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:6px;
}

.stat-pill{
    display:flex;
    align-items:center;
    gap:7px;
    min-height:26px;
    font-size:13px;
    color:#1f2937;
}

.stat-dot,
.legend-dot{
    width:11px;
    height:11px;
    border-radius:50%;
    display:inline-block;
    flex:0 0 auto;
}

.dot-red{background:var(--red);}
.dot-blue{background:var(--blue);}
.dot-yellow{background:var(--yellow);}
.dot-purple{background:var(--purple);}

.tabs{
    display:grid;
    grid-template-columns:1fr 1.1fr 1.1fr;
    gap:0;
    margin-bottom:10px;
    border:1px solid var(--border);
    border-radius:9px;
    overflow:hidden;
    background:#fff;
}

.tab-button{
    border:0;
    background:#fff;
    color:#1f2937;
    min-height:39px;
    padding:0 8px;
    border-right:1px solid var(--border);
    font-size:13px;
}

.tab-button:last-child{
    border-right:0;
}

.tab-button.active{
    background:#ecf5ff;
    color:var(--blue-dark);
    font-weight:700;
    box-shadow:inset 0 0 0 1px rgba(31,126,208,0.45);
}

.pin-filter{
    display:flex;
    align-items:center;
    gap:5px;
    margin:-2px 0 10px;
    padding:6px;
    border:1px solid var(--border);
    border-radius:9px;
    background:#fff;
    box-shadow:0 1px 2px rgba(15,23,42,0.04);
}

.pin-filter span{
    flex:1 0 auto;
    padding-left:4px;
    color:var(--muted);
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.045em;
}

.pin-filter-button{
    min-height:28px;
    padding:0 8px;
    border:1px solid transparent;
    border-radius:7px;
    background:#f8fafc;
    color:#334155;
    font-size:12px;
    font-weight:700;
}

.pin-filter-button:hover{
    background:#eef6ff;
}

.pin-filter-button.active{
    border-color:#bfdbfe;
    background:#ecf5ff;
    color:var(--blue-dark);
}

.route-card{
    margin-bottom:15px;
    overflow:hidden;
}

.route-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(90deg,#fff8e1 0%,#ffffff 48%,#f4edff 100%);
}

.route-heading{
    display:flex;
    flex-direction:column;
    gap:2px;
}

.section-title{
    font-size:14px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
}

.section-subtitle{
    font-size:12px;
    color:var(--muted);
}

.route-count-badge{
    min-width:28px;
    height:28px;
    padding:0 8px;
    border-radius:999px;
    background:var(--purple);
    color:#fff;
    display:grid;
    place-items:center;
    font-weight:700;
    font-size:13px;
}

#routeList{
    background:#fff;
}

.empty-route{
    padding:18px 14px;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.route-item{
    display:grid;
    grid-template-columns:32px 1fr auto;
    gap:8px;
    align-items:center;
    padding:9px 9px 9px 12px;
    border-bottom:1px solid var(--border);
}

.route-item:last-child{
    border-bottom:0;
}

.route-number{
    width:28px;
    height:28px;
    border-radius:50%;
    color:#fff;
    display:grid;
    place-items:center;
    font-weight:700;
    box-shadow:0 4px 10px rgba(15,23,42,0.18);
}

.route-number.start{
    background:var(--yellow);
    color:#111827;
}

.route-number.stop{
    background:var(--purple);
}

.route-type{
    display:block;
    font-size:10px;
    color:var(--yellow-dark);
    font-weight:700;
    text-transform:uppercase;
    margin-bottom:3px;
    letter-spacing:0.03em;
}

.route-type.stop{
    color:var(--purple-dark);
}

.route-info strong{
    display:block;
    font-size:14px;
    margin-bottom:2px;
}

.route-info span.address{
    display:block;
    font-size:12px;
    color:#1f2937;
    line-height:1.32;
}

.route-info span.county{
    display:block;
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
}

.route-tools{
    display:flex;
    flex-direction:row;
    gap:3px;
    align-items:center;
}

.mini-tools{
    display:flex;
    gap:4px;
}

.icon-btn{
    width:30px;
    height:30px;
    border:1px solid var(--border);
    border-radius:7px;
    background:#fff;
    color:#374151;
    font-weight:700;
    line-height:1;
    font-size:16px;
}

.icon-btn:hover:not(:disabled){
    background:#f1f5f9;
}

.icon-btn.danger:hover:not(:disabled){
    background:#fff1f2;
    border-color:#fecdd3;
    color:#be123c;
}

.route-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
    padding:10px 12px 12px;
    background:#fbfdff;
    border-top:1px solid var(--border);
}

.route-actions .full-width{
    grid-column:1 / -1;
}

.btn{
    min-height:39px;
    border-radius:8px;
    border:1px solid var(--border-strong);
    background:#fff;
    color:#1f2937;
    font-weight:700;
    box-shadow:0 1px 2px rgba(15,23,42,0.05);
}

.btn:hover:not(:disabled){
    background:#f8fafc;
}

.btn-primary{
    border-color:var(--blue);
    background:linear-gradient(180deg,#2e91eb 0%,#1f75d1 100%);
    color:#fff;
    box-shadow:0 8px 16px rgba(31,126,208,0.24);
}

.btn-primary:hover:not(:disabled){
    background:linear-gradient(180deg,#2486dd 0%,#1768bd 100%);
}

.btn-danger{
    border-color:#fecdd3;
    color:#be123c;
}

.jobs-card{
    overflow:hidden;
}

.jobs-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-bottom:1px solid var(--border);
    background:#fff;
}

.jobs-header small{
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
}

#list{
    background:#fff;
}

.job-card{
    position:relative;
    padding:10px 10px 10px 13px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:background 0.16s ease, transform 0.16s ease;
}

.job-card:hover{
    background:#f3f8ff;
}

.job-card.selected{
    background:#faf5ff;
    border-left:4px solid var(--purple);
    padding-left:11px;
}

.job-card.high:not(.selected){
    border-left:4px solid var(--red);
    padding-left:11px;
}

.job-main{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:start;
}

.job-eircode{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:15px;
    font-weight:700;
    margin-bottom:3px;
}

.priority-pin{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 0 3px rgba(31,126,208,0.12);
}

.priority-pin.high{
    background:var(--red);
    box-shadow:0 0 0 3px rgba(239,68,68,0.12);
}

.priority-pin.start{
    background:var(--yellow);
    box-shadow:0 0 0 3px rgba(250,204,21,0.2);
}

.priority-pin.selected{
    background:var(--purple);
    box-shadow:0 0 0 3px rgba(126,63,189,0.14);
}

.job-address{
    color:#1f2937;
    line-height:1.25;
    margin-bottom:3px;
}

.job-county{
    color:var(--muted);
    font-size:13px;
}

.job-badges{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
}

.badge{
    border-radius:999px;
    padding:4px 8px;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.02em;
    white-space:nowrap;
}

.badge-high{
    color:#991b1b;
    background:#fee2e2;
}

.badge-normal{
    color:#1d4ed8;
    background:#dbeafe;
}

.badge-route{
    color:#5b21b6;
    background:#ede9fe;
}

.job-actions{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin-top:7px;
}

.small-btn,
.job-link{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:28px;
    padding:0 8px;
    border-radius:7px;
    border:1px solid var(--border);
    background:#fff;
    color:#1f2937;
    text-decoration:none;
    font-size:12px;
    font-weight:700;
}

.small-btn:hover:not(:disabled),
.job-link:hover{
    background:#eef6ff;
    border-color:#b9d9ff;
}

.small-btn.selected-action{
    color:#5b21b6;
    border-color:#d8b4fe;
    background:#faf5ff;
}

.empty-list{
    padding:22px 14px;
    color:var(--muted);
    font-size:14px;
    line-height:1.4;
}

#mapWrap{
    flex:1;
    min-width:0;
    position:relative;
    background:#dbeafe;
}

#map{
    width:100%;
    height:100%;
}

.map-overlay{
    position:absolute;
    z-index:500;
    background:rgba(255,255,255,0.95);
    border:1px solid rgba(185,198,216,0.8);
    box-shadow:var(--shadow);
    backdrop-filter:blur(8px);
}

#routeTopbar{
    left:86px;
    top:14px;
    right:16px;
    min-height:64px;
    border-radius:12px;
    padding:10px 12px 9px;
}

.topbar-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-bottom:7px;
}

.topbar-title{
    font-size:14px;
    color:#1f2937;
    font-weight:700;
}

.clear-all-map{
    min-height:32px;
    padding:0 10px;
    border-radius:7px;
    border:1px solid var(--border);
    background:#fff;
    font-weight:700;
    color:#1f2937;
}

.topbar-steps{
    display:flex;
    align-items:flex-start;
    gap:6px;
    overflow:auto;
    padding-bottom:1px;
}

.top-step{
    min-width:58px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:5px;
    color:#111827;
}

.step-pin{
    width:28px;
    height:28px;
    border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    display:grid;
    place-items:center;
    background:#e5e7eb;
    color:#6b7280;
    border:2px solid #fff;
    box-shadow:0 6px 12px rgba(15,23,42,0.14);
}

.step-pin span{
    transform:rotate(45deg);
    font-size:12px;
    font-weight:700;
}

.step-pin.start{
    background:var(--yellow);
    color:#111827;
}

.step-pin.selected{
    background:var(--purple);
    color:#fff;
}

.step-pin.empty{
    border:2px dashed #94a3b8;
    background:#fff;
    color:#64748b;
}

.step-label{
    font-size:11px;
    font-weight:700;
    line-height:1.1;
}

.step-sub{
    font-size:10px;
    color:var(--muted);
    max-width:66px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.step-hint{
    align-self:center;
    padding:6px 10px;
    border:1px dashed var(--border-strong);
    border-radius:999px;
    color:var(--muted);
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
}

.step-arrow{
    padding-top:6px;
    color:#0f172a;
    font-size:17px;
    font-weight:700;
}

#legend{
    right:16px;
    top:62px;
    width:174px;
    border-radius:10px;
    padding:10px 12px;
}

.legend-row{
    display:flex;
    align-items:center;
    gap:9px;
    min-height:25px;
    font-size:13px;
    font-weight:700;
}

.legend-line{
    width:22px;
    border-top:3px dashed var(--purple);
}

#fitSelection{
    right:16px;
    bottom:18px;
    border:0;
    border-radius:10px;
    padding:0 16px;
    min-height:43px;
    font-weight:700;
    color:#111827;
}

.service-marker-wrapper{
    background:transparent;
    border:0;
    display:grid;
    place-items:center;
}

.service-marker{
    display:grid;
    place-items:center;
    border-radius:999px;
    border:2px solid #fff;
    box-shadow:0 5px 12px rgba(15,23,42,0.28);
    color:#fff;
    transform:none;
}

.service-marker span{
    font-size:12px;
    font-weight:700;
    line-height:1;
}

.service-marker.normal{
    width:16px;
    height:16px;
    background:var(--blue);
    opacity:0.84;
}

.service-marker.high{
    width:20px;
    height:20px;
    background:var(--red);
}

.service-marker.start,
.service-marker.selected{
    width:30px;
    height:30px;
    box-shadow:0 7px 16px rgba(15,23,42,0.32);
}

.service-marker.start{background:var(--yellow); color:#111827;}
.service-marker.selected{background:var(--purple);}

body.zoom-wide .service-marker.normal{
    width:11px;
    height:11px;
    opacity:0.42;
    border-width:1px;
    box-shadow:0 3px 8px rgba(15,23,42,0.18);
}

body.zoom-wide .service-marker.high{
    width:17px;
    height:17px;
}

body.zoom-close .service-marker.normal{
    opacity:0.95;
}


.popup-card{
    min-width:210px;
}

.popup-card strong{
    font-size:16px;
}

.popup-meta{
    color:#4b5563;
    margin:4px 0 8px;
    line-height:1.35;
}

.popup-priority{
    margin:7px 0;
    font-weight:700;
}

.popup-route-status{
    margin:7px 0;
    color:#5b21b6;
    font-weight:700;
}

.popup-links{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
}

.popup-links a{
    display:inline-flex;
    align-items:center;
    min-height:29px;
    padding:0 8px;
    border-radius:6px;
    background:#f1f5f9;
    color:#0f172a;
    text-decoration:none;
    font-weight:700;
}

.popup-links a:hover{
    background:#e0f2fe;
}

.leaflet-popup-content-wrapper{
    border-radius:10px;
}


.title-left{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
}

.header-actions{
    display:flex;
    gap:6px;
    align-items:center;
    flex:0 0 auto;
}

.header-btn{
    min-height:31px;
    padding:0 9px;
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    color:#334155;
    font-size:12px;
    font-weight:700;
}

.header-btn:hover{
    background:#eef6ff;
    border-color:#b9d9ff;
}

.header-btn.icon-only{
    width:31px;
    padding:0;
    font-size:22px;
    line-height:1;
}

.status-count{
    white-space:nowrap;
}

.icon-btn:disabled{
    display:none;
}

.topbar-actions{
    display:flex;
    align-items:center;
    gap:6px;
}

#topbarCount{
    margin-left:6px;
    padding:2px 7px;
    border-radius:999px;
    background:#ede9fe;
    color:#5b21b6;
    font-size:12px;
}

.legend-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding-bottom:6px;
    margin-bottom:4px;
    border-bottom:1px solid var(--border);
    font-size:13px;
}

.legend-head button{
    border:0;
    background:transparent;
    color:var(--muted);
    font-size:11px;
    font-weight:700;
    padding:3px 4px;
}

.legend-head button:hover{
    color:var(--text);
}

#showLegend,
#showPlannerBar,
#showSidebar{
    display:none;
    border:0;
    border-radius:10px;
    padding:0 13px;
    min-height:40px;
    color:#111827;
    font-weight:700;
}

#showLegend{
    right:16px;
    top:62px;
}

#showPlannerBar{
    left:86px;
    top:14px;
}

#showSidebar{
    left:16px;
    bottom:18px;
}

#legend,
#showLegend{
    display:none !important;
}

body.legend-hidden #legend{
    display:none;
}

body.legend-hidden #showLegend{
    display:none !important;
}

body.no-route #routeTopbar,
body.no-route #showPlannerBar{
    display:none !important;
}

        spiderfyOnMaxZoom:true,
        zoomToBoundsOnClick:true,
        removeOutsideVisibleBounds:true,
        disableClusteringAtZoom:12,
        maxClusterRadius:function(zoom){
            if(zoom <= 8){ return 48; }
            if(zoom <= 10){ return 38; }
            return 28;
        },
        iconCreateFunction:function(cluster){
            const count = cluster.getChildCount();
            const sizeClass = count >= 50 ? "large" : count >= 15 ? "medium" : "small";
            const size = count >= 50 ? 48 : count >= 15 ? 40 : 34;
            return L.divIcon({
                className:"service-cluster-wrapper",
                html:'<div class="service-cluster ' + sizeClass + '"><span>' + count + '</span></div>',
                iconSize:[size, size],
                iconAnchor:[size / 2, size / 2]
            });
        }
    })
    : L.layerGroup();

normalClusterGroup.addTo(map);

function escapeHtml(value){
    return String(value ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
}

function clean(value){
    return String(value ?? "").trim();
}

function parseCSV(text){
    const parsed = [];
    let row = [];
    let field = "";
    let inQuotes = false;

    for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"'){
            if(inQuotes && next === '"'){
                field += '"';
                i++;
            }else{
                inQuotes = !inQuotes;
            }
        }else if(char === "," && !inQuotes){
            row.push(field);
            field = "";
        }else if((char === "\n" || char === "\r") && !inQuotes){
            if(char === "\r" && next === "\n"){
                i++;
            }
            row.push(field);
            if(row.some(cell => clean(cell) !== "")){
                parsed.push(row);
            }
            row = [];
            field = "";
        }else{
            field += char;
        }
    }

    row.push(field);
    if(row.some(cell => clean(cell) !== "")){
        parsed.push(row);
    }

    return parsed;
}

function normalizePriority(value){
    const priority = clean(value).toLowerCase();
    return priority === "high" ? "High" : "Standard";
}

function isHighPriority(job){
    return job.priority === "High";
}

function makeJobId(job, index){
    if(job.eircode){
        return "eircode:" + job.eircode.toUpperCase().replace(/\s+/g, "");
    }
    return ["job", index, job.lat.toFixed(6), job.lng.toFixed(6), job.address.toLowerCase()].join("|");
}

function getSelectedIndex(job){
    return selectedJobs.findIndex(selected => selected.id === job.id);
}

function isSelected(job){
    return getSelectedIndex(job) !== -1;
}

function coordinates(job){
    return job.lat + "," + job.lng;
}

function isValidUrl(value){
    try{
        const url = new URL(value);
        return url.protocol === "http:" || url.protocol === "https:";
    }catch(error){
        return false;
    }
}

function createMarkerIcon(job){
    const index = getSelectedIndex(job);
    let type = isHighPriority(job) ? "high" : "normal";
    let label = "";
    let size = 18;

    if(type === "high"){
        size = 22;
    }

    if(highlightedJobId === job.id && index === -1){
        size += 8;
    }

    if(index === 0){
        type = "start";
        label = "1";
        size = 30;
    }else if(index > 0){
        type = "selected";
        label = String(index + 1);
        size = 30;
    }

    return L.divIcon({
        className:"service-marker-wrapper",
        html:'<div class="service-marker ' + type + (highlightedJobId === job.id ? ' highlighted' : '') + '"><span>' + label + '</span></div>',
        iconSize:[size, size],
        iconAnchor:[size / 2, size / 2],
        popupAnchor:[0, -size / 2]
    });
}

function buildPopup(job){
    const ticketLink = isValidUrl(job.ticketUrl)
        ? '<a href="' + escapeHtml(job.ticketUrl) + '" target="_blank" rel="noopener">Zoho</a>'
        : "";
    const navigateLink = '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(coordinates(job)) + '&travelmode=driving" target="_blank" rel="noopener">Nav</a>';

    return '' +
        '<div class="popup-card">' +
            '<strong>' + escapeHtml(job.eircode || "No Eircode") + '</strong>' +
            '<div class="popup-meta">' + escapeHtml(job.address) + '<br>' + escapeHtml(job.county) + '</div>' +
            '<div class="popup-links">' + ticketLink + navigateLink + '</div>' +
        '</div>';
}

            job.marker.setPopupContent(buildPopup(job));

        }
    });
    updateMarkerVisibility();
}

function redrawRouteLine(){

        map.removeLayer(routeLine);
        routeLine = null;
    }

    if(selectedJobs.length < 2){
        return;
    }

    routeLine = L.polyline(selectedJobs.map(job => [job.lat, job.lng]), {
        color:"#7e3fbd",
        weight:5,
        opacity:0.82,
        dashArray:"11 7",
        lineCap:"round"
    }).addTo(map);
}

function saveSelectedRoute(){
    try{
        localStorage.setItem(ROUTE_STORAGE_KEY, JSON.stringify(selectedJobs.map(job => job.id)));
    }catch(error){
        console.warn("Could not save selected route", error);
    }
}

function restoreSelectedRoute(){
    try{
        const stored = JSON.parse(localStorage.getItem(ROUTE_STORAGE_KEY) || "[]");
        if(!Array.isArray(stored)){
            selectedJobs = [];
            return;
        }
        selectedJobs = stored
            .map(id => rows.find(job => job.id === id))
            .filter(Boolean)
            .slice(0, MAX_ROUTE_STOPS);
    }catch(error){
        selectedJobs = [];
    }
}

function updateAfterSelectionChange(options = {}){
    saveSelectedRoute();
    refreshMarkersAndPopups();
    redrawRouteLine();
    renderAll();

    if(options.fit){
        fitSelectedRoute();
    }
}

function toggleSelection(job){
    const index = getSelectedIndex(job);

    if(index >= 0){
        selectedJobs.splice(index, 1);
    }else{
        if(selectedJobs.length >= MAX_ROUTE_STOPS){
            alert("You can select up to " + MAX_ROUTE_STOPS + " locations.");
            return;
        }
        selectedJobs.push(job);
    }

    updateAfterSelectionChange();
}

function removeStop(jobId){
    const index = selectedJobs.findIndex(job => job.id === jobId);
    if(index === -1){
        return;
    }
    selectedJobs.splice(index, 1);
    updateAfterSelectionChange();
}

function moveStop(jobId, direction){
    const index = selectedJobs.findIndex(job => job.id === jobId);
    const nextIndex = index + direction;
    if(index === -1 || nextIndex < 0 || nextIndex >= selectedJobs.length){
        return;
    }
    // The first selected job is the locked starting point. Reordering only affects stops 2-5.
    if(index === 0 || nextIndex === 0){
        return;
    }
    const temp = selectedJobs[index];
    selectedJobs[index] = selectedJobs[nextIndex];
    selectedJobs[nextIndex] = temp;
    updateAfterSelectionChange();
}

function clearRoute(){
    selectedJobs = [];
    updateAfterSelectionChange();
}

function fitBoundsForJobs(jobs){
    const validJobs = jobs.filter(job => Number.isFinite(job.lat) && Number.isFinite(job.lng));
    if(validJobs.length === 0){
        map.setView([53.35, -7.7], 7);
        return;
    }

    if(validJobs.length === 1){
        map.setView([validJobs[0].lat, validJobs[0].lng], 13);
        return;
    }

    const bounds = L.latLngBounds(validJobs.map(job => [job.lat, job.lng]));
    map.fitBounds(bounds, {
        padding:[60, 60],
        maxZoom:13
    });
}

function fitSelectedRoute(){
    if(selectedJobs.length > 0){
        fitBoundsForJobs(selectedJobs);
    }else{
        fitBoundsForJobs(rows);
    }
}

function focusJob(job){
    map.setView([job.lat, job.lng], 14);
    if(job.marker){
        job.marker.openPopup();
    }
}

function googleMapsRouteUrl(){
    if(selectedJobs.length === 0){
        return "";
    }

    if(selectedJobs.length === 1){
        return "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(coordinates(selectedJobs[0])) + "&travelmode=driving";
    }

    const origin = coordinates(selectedJobs[0]);
    const destination = coordinates(selectedJobs[selectedJobs.length - 1]);
    const waypoints = selectedJobs.slice(1, -1).map(coordinates);
    const params = new URLSearchParams();

    params.set("api", "1");
    params.set("origin", origin);
    params.set("destination", destination);
    if(waypoints.length > 0){
        params.set("waypoints", waypoints.join("|"));
    }
    params.set("travelmode", "driving");

    return "https://www.google.com/maps/dir/?" + params.toString();
}

function openRouteInGoogleMaps(){
    if(selectedJobs.length === 0){
        alert("Select at least one location first.");
        return;
    }

    window.open(googleMapsRouteUrl(), "_blank", "noopener");
}

function searchMatches(job){
    const filter = currentSearch.trim().toLowerCase();
    if(!filter){
        return true;
    }
    return [job.eircode, job.address, job.county, job.priority]
        .join(" ")
        .toLowerCase()
        .includes(filter);
}

function updateZoomClass(){
    const zoom = map.getZoom();
    document.body.classList.toggle("zoom-wide", zoom <= 8);
    document.body.classList.toggle("zoom-mid", zoom > 8 && zoom < 12);
    document.body.classList.toggle("zoom-close", zoom >= 12);
}

function shouldClusterJob(job){
    // Keep high-priority and selected route pins visible above clusters.
    return Boolean(job && job.marker && !isHighPriority(job) && !isSelected(job));
}

function removeMarkerFromAllLayers(marker){
    if(!marker){
        return;
    }
    if(map.hasLayer(marker)){
        map.removeLayer(marker);
    }
    if(normalClusterGroup && normalClusterGroup.hasLayer(marker)){
        normalClusterGroup.removeLayer(marker);
    }
}

function placeMarker(job){
    if(!job || !job.marker){
        return;
    }

    const inCluster = normalClusterGroup && normalClusterGroup.hasLayer(job.marker);
    const onMap = map.hasLayer(job.marker);

    if(shouldClusterJob(job)){
        if(!inCluster){
            if(onMap){
                map.removeLayer(job.marker);
            }
            normalClusterGroup.addLayer(job.marker);
        }
    }else{
        if(inCluster){
            normalClusterGroup.removeLayer(job.marker);
        }
        if(!map.hasLayer(job.marker)){
            job.marker.addTo(map);
        }
    }
}

function updateMarkerVisibility(){
    rows.forEach(placeMarker);
    if(normalClusterGroup && typeof normalClusterGroup.refreshClusters === "function"){
        normalClusterGroup.refreshClusters();
    }
}

function updatePinModeButtons(){
    els.pinModeButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.pinMode === currentPinMode);
    });
}

function jobsForCurrentView(){
    if(currentTab === "selected"){
        return selectedJobs.filter(searchMatches);
    }

    return rows.filter(job => {
        if(!searchMatches(job)){
            return false;
        }
        if(currentTab === "high"){
            return isHighPriority(job);
        }
        return true;
    });
}

    els.highCount.textContent = "High: " + high;

    }

    document.body.classList.toggle("route-editing", routeEditMode);

    }
    if(els.routeModeText){
        els.routeModeText.textContent = routeEditMode ? "Builder on" : "Builder off";

    els.fitRoute.disabled = rows.length === 0;

}

function renderRoutePanel(){
    if(selectedJobs.length === 0){
        els.routeList.innerHTML = '<div class="empty-route">No route selected.</div>';
        return;
    }

    els.routeList.innerHTML = selectedJobs.map((job, index) => {
        const isStart = index === 0;
        const routeType = isStart ? "Start locked" : "Stop " + (index + 1);
        const routeClass = isStart ? "start" : "stop";
        return '' +
            '<article class="route-item" data-id="' + escapeHtml(job.id) + '">' +
                '<div class="route-number ' + routeClass + '">' + (index + 1) + '</div>' +
                '<div class="route-info">' +
                    '<span class="route-type ' + routeClass + '">' + escapeHtml(routeType) + '</span>' +
                    '<strong>' + escapeHtml(job.eircode || "No Eircode") + '</strong>' +
                    '<span class="address">' + escapeHtml(job.address) + '</span>' +
                    '<span class="county">' + escapeHtml(job.county) + '</span>' +
                '</div>' +
                '<div class="route-tools">' +
                    '<div class="mini-tools">' +
                        '<button type="button" class="icon-btn" data-action="up" data-id="' + escapeHtml(job.id) + '" title="Move up" aria-label="Move up" ' + (index <= 1 ? "disabled" : "") + '>&uarr;</button>' +
                        '<button type="button" class="icon-btn" data-action="down" data-id="' + escapeHtml(job.id) + '" title="Move down" aria-label="Move down" ' + (index === 0 || index === selectedJobs.length - 1 ? "disabled" : "") + '>&darr;</button>' +
                        '<button type="button" class="icon-btn danger remove-stop" data-action="remove" data-id="' + escapeHtml(job.id) + '" title="Remove from route" aria-label="Remove from route">&minus;</button>' +
                    '</div>' +
                '</div>' +
            '</article>';
    }).join("");

    els.routeList.querySelectorAll(".route-item[data-id]").forEach(item => {
        item.addEventListener("click", () => {
            const job = rows.find(row => row.id === item.dataset.id);
            if(job){
                focusJob(job);
            }
        });
    });

    els.routeList.querySelectorAll("button[data-action]").forEach(button => {
        button.addEventListener("click", event => {
            event.stopPropagation();
            const action = button.dataset.action;
            const id = button.dataset.id;

            if(action === "up"){
                moveStop(id, -1);
            }else if(action === "down"){
                moveStop(id, 1);
            }else if(action === "remove"){
                removeStop(id);
            }
        });
    });
}

function renderTopRouteBar(){
    if(selectedJobs.length === 0){
        els.topRouteSteps.innerHTML = "";
        return;
    }

    const parts = [];

    selectedJobs.forEach((job, index) => {
        const isStart = index === 0;
        const pinClass = isStart ? "start" : "selected";
        const label = isStart ? "Start" : "Stop " + (index + 1);
        const sub = job.eircode || job.county || "Selected";

        parts.push(
            '<div class="top-step" data-id="' + escapeHtml(job.id) + '">' +
                '<div class="step-pin ' + pinClass + '"><span>' + (index + 1) + '</span></div>' +
                '<div class="step-label">' + escapeHtml(label) + '</div>' +
                '<div class="step-sub">' + escapeHtml(sub) + '</div>' +
            '</div>'
        );

        if(index < selectedJobs.length - 1){
            parts.push('<div class="step-arrow">&rarr;</div>');
        }
    });

    if(selectedJobs.length < MAX_ROUTE_STOPS){
        parts.push('<div class="step-hint">Add more from pins or list</div>');
    }

    els.topRouteSteps.innerHTML = parts.join("");
    els.topRouteSteps.querySelectorAll(".top-step[data-id]").forEach(step => {
        step.addEventListener("click", () => {
            const job = rows.find(item => item.id === step.dataset.id);
            if(job){
                focusJob(job);
            }
        });
    });
}

function jobCardHtml(job){
    const index = getSelectedIndex(job);
    const selected = index !== -1;
    const isStart = index === 0;
    const high = isHighPriority(job);
    const pinClass = selected ? (isStart ? "start" : "selected") : (high ? "high" : "");
    const priorityBadge = high
        ? '<span class="badge badge-high">High</span>'
        : '<span class="badge badge-normal">Normal</span>';
    const routeBadge = selected
        ? '<span class="badge badge-route">' + (isStart ? "Start" : "Stop " + (index + 1)) + '</span>'
        : "";
    const ticketLink = isValidUrl(job.ticketUrl)
        ? '<a class="job-link" href="' + escapeHtml(job.ticketUrl) + '" target="_blank" rel="noopener">Zoho</a>'
        : "";
    const navigateLink = '<a class="job-link" href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(coordinates(job)) + '&travelmode=driving" target="_blank" rel="noopener">Nav</a>';
    const addDisabled = !selected && selectedJobs.length >= MAX_ROUTE_STOPS ? "disabled" : "";
    const actionLabel = selected ? "&minus;" : "+";
    const actionTitle = selected ? "Remove from route" : "Add to route";
    const actionClass = selected ? " selected-action route-minus" : " route-plus";
    const routeToggleButton = routeEditMode
        ? '<button type="button" class="small-btn' + actionClass + '" data-action="toggle" title="' + actionTitle + '" aria-label="' + actionTitle + '" ' + addDisabled + '>' + actionLabel + '</button>'
        : '';

    return '' +
        '<div class="job-main">' +
            '<div>' +
                '<div class="job-eircode"><span class="priority-pin ' + pinClass + '"></span>' + escapeHtml(job.eircode || "No Eircode") + '</div>' +
                '<div class="job-address">' + escapeHtml(job.address) + '</div>' +
                '<div class="job-county">' + escapeHtml(job.county) + '</div>' +
            '</div>' +
            '<div class="job-badges">' + priorityBadge + routeBadge + '</div>' +
        '</div>' +
        '<div class="job-actions">' +
            routeToggleButton +
            ticketLink +
            navigateLink +
        '</div>';
}

function setHighlightedJob(jobId){
    highlightedJobId = jobId;
    rows.forEach(job => {
        if(job.marker){
            job.marker.setIcon(createMarkerIcon(job));
            job.marker.setZIndexOffset(markerZIndex(job));
        }
    });
}

function markerZIndex(job){
    const index = getSelectedIndex(job);
    if(highlightedJobId === job.id){
        return 1500;
    }
    if(index >= 0){
        return 1200 + index;
    }
    if(isHighPriority(job)){
        return 800;
    }
    return 0;
}

function renderJobsList(){
    const jobs = jobsForCurrentView();
    els.jobsShown.textContent = jobs.length + " shown";

    if(rows.length === 0){
        els.list.innerHTML = '<div class="empty-list">No locations loaded yet.</div>';
        return;
    }

    if(jobs.length === 0){
        els.list.innerHTML = '<div class="empty-list">No jobs match the current search or filter.</div>';
        return;
    }

    els.list.innerHTML = "";

    jobs.forEach(job => {
        const card = document.createElement("article");
        const selected = isSelected(job);
        card.className = "job-card" + (selected ? " selected" : "") + (isHighPriority(job) ? " high" : "");
        card.innerHTML = jobCardHtml(job);
        card.addEventListener("click", () => focusJob(job));
        card.addEventListener("mouseenter", () => setHighlightedJob(job.id));
        card.addEventListener("mouseleave", () => setHighlightedJob(null));

        card.querySelectorAll("button, a").forEach(control => {
            control.addEventListener("click", event => event.stopPropagation());
        });

        const toggleButton = card.querySelector('button[data-action="toggle"]');
        if(toggleButton){
            toggleButton.addEventListener("click", () => toggleSelection(job));
        }

        const focusButton = card.querySelector('button[data-action="focus"]');
        if(focusButton){
            focusButton.addEventListener("click", () => focusJob(job));
        }

        els.list.appendChild(card);
    });
}

function renderAll(){
    renderStats();
    renderRoutePanel();
    renderTopRouteBar();
    renderJobsList();
    updatePinModeButtons();
    updateMarkerVisibility();
}

function createMarkers(){
    markers.forEach(removeMarkerFromAllLayers);
    if(normalClusterGroup && typeof normalClusterGroup.clearLayers === "function"){
        normalClusterGroup.clearLayers();
    }
    markers = [];

    rows.forEach(job => {
        const marker = L.marker([job.lat, job.lng], {
            icon:createMarkerIcon(job),
            keyboard:true,
            title:job.eircode || job.address
        });

        marker.bindPopup(buildPopup(job));
        marker.on("click", () => {
            if(routeEditMode){
                toggleSelection(job);
            }
        });
        job.marker = marker;
        markers.push(marker);
        placeMarker(job);
    });
}

function setLoadedTime(){

    });
    const time = now.toLocaleTimeString("en-IE", {
        hour:"2-digit",

    });
    els.lastUpdated.textContent = "Loaded " + date + " " + time;
}

function loadJobs(){
    fetch(CSV_URL, { cache:"no-store" })
        .then(response => {
            if(!response.ok){
                throw new Error("Google Sheet returned " + response.status);
            }
            return response.text();
        })
        .then(text => {
            const csvRows = parseCSV(text);
            const dataRows = csvRows.slice(1);

            rows = dataRows.map((columns, index) => {
                const job = {
                    address:clean(columns[0]),
                    county:clean(columns[1]),
                    eircode:clean(columns[2]),
                    lat:parseFloat(clean(columns[3])),
                    lng:parseFloat(clean(columns[4])),
                    ticketUrl:clean(columns[6]),
                    priority:normalizePriority(columns[7])
                };
                job.id = makeJobId(job, index);
                return job;
            }).filter(job => Number.isFinite(job.lat) && Number.isFinite(job.lng));

            restoreSelectedRoute();
            createMarkers();
            refreshMarkersAndPopups();
            redrawRouteLine();
            setLoadedTime();
            renderAll();
            fitSelectedRoute();
        })
        .catch(error => {
            console.error(error);
            els.status.textContent = "Could not load Google Sheet";
            els.lastUpdated.textContent = "Check published CSV";
            renderAll();
        });
}


function readUiState(){
    try{
        return JSON.parse(localStorage.getItem(UI_STORAGE_KEY) || "{}");
    }catch(error){
        return {};
    }
}

function saveUiState(patch){
    try{
        localStorage.setItem(UI_STORAGE_KEY, JSON.stringify(Object.assign(readUiState(), patch)));
    }catch(error){
        console.warn("Could not save UI state", error);
    }
}

function setUiClass(className, enabled){
    document.body.classList.toggle(className, Boolean(enabled));
    setTimeout(() => map.invalidateSize(), 180);
}

function initUiState(){
    const state = readUiState();
    currentPinMode = "all";
    routeEditMode = false;
    setUiClass("compact-mode", false);
    setUiClass("sidebar-collapsed", Boolean(state.sidebarCollapsed));
    setUiClass("topbar-hidden", Boolean(state.topbarHidden));
    setUiClass("legend-hidden", true);
    document.body.classList.add("no-route");
    updateZoomClass();
    updatePinModeButtons();
}

els.search.addEventListener("input", event => {
    currentSearch = event.target.value;
    renderAll();
});

els.clearSearch.addEventListener("click", () => {
    els.search.value = "";
    currentSearch = "";
    renderAll();
    els.search.focus();
});

els.tabButtons.forEach(button => {
    button.addEventListener("click", () => {
        currentTab = button.dataset.tab;
        renderAll();
    });
});

els.pinModeButtons.forEach(button => {
    button.addEventListener("click", () => {
        currentPinMode = button.dataset.pinMode;
        saveUiState({ pinMode:currentPinMode });
        renderAll();
    });
});

map.on("zoomend", () => {
    updateZoomClass();
    updateMarkerVisibility();
});

els.clearRoute.addEventListener("click", clearRoute);
els.clearAllMap.addEventListener("click", clearRoute);
els.fitRoute.addEventListener("click", fitSelectedRoute);
els.fitSelection.addEventListener("click", fitSelectedRoute);
els.openRoute.addEventListener("click", openRouteInGoogleMaps);

if(els.toggleCompact){
    els.toggleCompact.addEventListener("click", () => {
        const enabled = !document.body.classList.contains("compact-mode");
        setUiClass("compact-mode", enabled);
        saveUiState({ compact:enabled });
    });
}

if(els.routeEditMode){
    els.routeEditMode.addEventListener("change", event => {
        routeEditMode = event.target.checked;
        renderAll();
    });
}

els.collapseSidebar.addEventListener("click", () => {
    setUiClass("sidebar-collapsed", true);
    saveUiState({ sidebarCollapsed:true });
});

els.showSidebar.addEventListener("click", () => {
    setUiClass("sidebar-collapsed", false);
    saveUiState({ sidebarCollapsed:false });
});

els.toggleTopbar.addEventListener("click", () => {
    setUiClass("topbar-hidden", true);
    saveUiState({ topbarHidden:true });
});

els.showPlannerBar.addEventListener("click", () => {
    setUiClass("topbar-hidden", false);
    saveUiState({ topbarHidden:false });
});

els.toggleLegend.addEventListener("click", () => {
    setUiClass("legend-hidden", true);
    saveUiState({ legendHidden:true });
});

els.showLegend.addEventListener("click", () => {
    setUiClass("legend-hidden", false);
    saveUiState({ legendHidden:false });
});

// Future parking note: keyboard shortcuts can be added later once the route workflow is settled.
initUiState();
loadJobs();
</script>
</body>
</html>
